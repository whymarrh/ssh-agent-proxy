[package]
name = "op-ssh-agent-proxy"
version = "0.1.0"
edition = "2021"
description = "SSH agent proxy that filters keys based on the requesting process's working directory"

[[bin]]
name = "op-ssh-agent-proxy"
path = "src/main.rs"

[dependencies]
base64 = "0.22"
serde = { version = "1", features = ["derive"] }
sha2 = "0.10"
ssh-agent-lib = { version = "0.5", default-features = false, features = ["codec"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread", "net", "io-util", "signal"] }
toml = "0.8"

# Standalone crate -- not part of the parent workspace.
[workspace]
